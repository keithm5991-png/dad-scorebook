<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Scorebook</title>
<style>
  :root{
    --paper:#f7f1e0;
    --paper2:#f2ebd6;
    --ink:#23232a;            /* printed ink */
    --ink-soft:#3c3c46;
    --pencil:#3d4661;         /* handwritten marks */
    --pencil-soft:#5b6480;
    --desk:#2e2a26;
    --me:#b08d2f;
    --hand:'Segoe Print','Bradley Hand','Comic Sans MS',cursive;
    --print:'Arial Narrow',Arial,Helvetica,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--desk);
    background-image:
      radial-gradient(ellipse at 30% 0%, rgba(255,255,255,.06), transparent 60%),
      repeating-linear-gradient(95deg, rgba(0,0,0,.10) 0 2px, transparent 2px 90px),
      repeating-linear-gradient(92deg, rgba(255,255,255,.02) 0 1px, transparent 1px 34px);
    font-family:var(--print);
    color:var(--ink);
    min-height:100vh;
  }
  button{font-family:inherit}

  /* ---------- top bar (the "desk") ---------- */
  #bar{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    padding:10px 14px;color:#cfc6b8;font-size:14px;
  }
  #bar .ttl{font-weight:bold;letter-spacing:.12em;font-size:13px;color:#e8dfcf;margin-right:auto}
  .bbtn{
    background:#4a423a;color:#efe7d8;border:1px solid #6a5f53;border-radius:6px;
    padding:7px 13px;font-size:13px;cursor:pointer;letter-spacing:.04em;
  }
  .bbtn:active{transform:translateY(1px)}
  .bbtn.warn{background:#5a3030;border-color:#7d4a4a}

  /* ---------- the torn page ---------- */
  #pagewrap{display:flex;justify-content:center;padding:6px 10px 120px}
  .page{
    position:relative;
    background:var(--paper);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/><feColorMatrix type='saturate' values='0'/><feComponentTransfer><feFuncA type='linear' slope='.045'/></feComponentTransfer></filter><rect width='240' height='240' filter='url(%23n)'/></svg>");
    box-shadow:0 18px 45px rgba(0,0,0,.55), 0 2px 8px rgba(0,0,0,.4);
    padding:22px 26px 26px 44px;
    transform:rotate(-.25deg);
    width:1120px;max-width:none;
    clip-path:polygon(
      1.6% 0%, 100% 0%, 100% 100%, 1.2% 100%,
      0.4% 98.5%, 1.7% 97.2%, 0.6% 95.6%, 1.5% 94.1%, 0.3% 92.3%, 1.8% 90.8%,
      0.7% 89.0%, 1.4% 87.4%, 0.5% 85.5%, 1.9% 84.0%, 0.6% 82.1%, 1.3% 80.6%,
      0.2% 78.8%, 1.7% 77.1%, 0.8% 75.3%, 1.5% 73.8%, 0.4% 71.9%, 1.8% 70.4%,
      0.6% 68.5%, 1.2% 67.0%, 0.3% 65.2%, 1.6% 63.6%, 0.7% 61.8%, 1.4% 60.2%,
      0.5% 58.4%, 1.9% 56.8%, 0.4% 55.0%, 1.5% 53.4%, 0.6% 51.6%, 1.7% 50.0%,
      0.3% 48.2%, 1.4% 46.6%, 0.7% 44.8%, 1.8% 43.2%, 0.5% 41.4%, 1.3% 39.8%,
      0.2% 38.0%, 1.6% 36.4%, 0.8% 34.6%, 1.5% 33.0%, 0.4% 31.2%, 1.7% 29.6%,
      0.6% 27.8%, 1.2% 26.2%, 0.3% 24.4%, 1.8% 22.8%, 0.7% 21.0%, 1.4% 19.4%,
      0.5% 17.6%, 1.6% 16.0%, 0.4% 14.2%, 1.5% 12.6%, 0.6% 10.8%, 1.8% 9.2%,
      0.3% 7.4%, 1.3% 5.8%, 0.7% 4.0%, 1.6% 2.4%, 0.9% 1.1%
    );
  }
  .page::before{ /* shading along torn edge */
    content:"";position:absolute;inset:0 auto 0 0;width:38px;
    background:linear-gradient(90deg, rgba(0,0,0,.14), rgba(0,0,0,.04) 55%, transparent);
    pointer-events:none;
  }

  /* ---------- sheet header ---------- */
  .sheet-title{
    text-align:center;font-weight:900;font-size:30px;letter-spacing:.06em;
    font-family:Arial,Helvetica,sans-serif;margin:0 0 4px;
  }
  .meta{
    display:flex;gap:6px;align-items:baseline;justify-content:center;
    font-size:13px;margin-bottom:10px;flex-wrap:wrap;
  }
  .meta .lbl{font-weight:bold}
  .meta .fill{
    border:none;border-bottom:1px solid var(--ink);background:transparent;
    font-family:var(--hand);font-size:16px;color:var(--pencil);
    min-width:130px;padding:0 4px;outline:none;
  }
  .meta .fill.small{min-width:80px}

  /* ---------- grid ---------- */
  table.score{border-collapse:collapse;width:100%;table-layout:fixed}
  table.score th, table.score td{border:1px solid var(--ink);padding:0;position:relative}
  table.score th{
    font-size:11px;font-weight:bold;background:var(--paper2);
    padding:3px 2px;letter-spacing:.04em;
  }
  th.players-h{text-align:left;padding-left:6px}
  col.c-name{width:128px} col.c-pos{width:30px}
  col.c-inn{width:auto} col.c-stat{width:30px}

  td.namecell{vertical-align:top;padding:2px 4px 0}
  td.namecell .pname{
    width:100%;border:none;background:transparent;outline:none;
    font-family:var(--hand);font-size:15px;color:var(--pencil);font-weight:600;
  }
  td.namecell .sub{
    display:flex;align-items:baseline;gap:3px;border-top:1px dotted #999;
    font-size:9px;color:#777;margin-top:1px;
  }
  td.namecell .sub input{
    width:100%;border:none;background:transparent;outline:none;
    font-family:var(--hand);font-size:12px;color:var(--pencil-soft);
  }
  td.namecell .mestar{
    position:absolute;top:1px;right:1px;font-size:13px;cursor:pointer;
    color:#c9c0ab;line-height:1;padding:2px;user-select:none;
  }
  td.namecell .mestar.on{color:var(--me)}
  tr.merow td.namecell{background:rgba(176,141,47,.10)}

  td.poscell input{
    width:100%;border:none;background:transparent;outline:none;text-align:center;
    font-family:var(--hand);font-size:14px;color:var(--pencil);
  }

  /* ---------- diamond cell ---------- */
  td.dcell{height:56px;cursor:pointer;vertical-align:top}
  td.dcell:hover{background:rgba(0,0,0,.035)}
  td.dcell.sel{outline:2px solid var(--me);outline-offset:-2px}
  .cellbox{display:flex;height:56px}
  .pips{display:flex;flex-direction:column;justify-content:center;gap:1px;padding:2px 1px 2px 2px}
  .pip{width:7px;height:7px;border:1px solid #555;background:transparent}
  .pip.s{margin-top:3px}
  .pip.on{background:var(--pencil)}
  .dsvg{flex:1;height:100%}
  .restxt{
    font-family:var(--hand);font-weight:700;
  }
  td.statcell{text-align:center;font-family:var(--hand);font-size:14px;color:var(--pencil);font-weight:700}
  td.statcell.e{cursor:pointer}

  /* totals rows */
  tr.totals td{height:24px;text-align:center;font-family:var(--hand);font-size:14px;color:var(--pencil);font-weight:700;background:var(--paper2)}
  tr.totals td.rowlbl{font-family:var(--print);font-size:10px;font-weight:bold;color:var(--ink);text-align:right;padding-right:6px;letter-spacing:.05em}
  tr.totals input{width:100%;border:none;background:transparent;text-align:center;outline:none;font-family:var(--hand);font-size:14px;color:var(--pencil);font-weight:700}

  /* ---------- bottom block ---------- */
  .bottom{display:flex;gap:16px;margin-top:14px;align-items:flex-start}
  table.pitch{border-collapse:collapse;font-size:10px;flex:1}
  table.pitch th,table.pitch td{border:1px solid var(--ink);padding:2px 3px;text-align:center}
  table.pitch th{background:var(--paper2);font-size:9px}
  table.pitch input{width:100%;min-width:24px;border:none;background:transparent;text-align:center;outline:none;font-family:var(--hand);font-size:12px;color:var(--pencil)}
  table.pitch input.pn{min-width:90px;text-align:left}
  .brand{ text-align:right;font-size:11px;font-weight:bold;letter-spacing:.05em;color:var(--ink-soft);align-self:flex-end;line-height:1.5}
  .brand .shield{font-size:22px}

  /* ---------- score pad ---------- */
  #pad{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:#27241f;color:#e9e1d2;border-top:2px solid #574c3e;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:none;box-shadow:0 -10px 30px rgba(0,0,0,.5);
  }
  #pad.open{display:block}
  #pad .padrow{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
  #pad .plbl{font-size:10px;letter-spacing:.1em;color:#a39782;width:62px;flex:none}
  .pbtn{
    background:#3b362e;color:#f0e8d8;border:1px solid #5a5244;border-radius:6px;
    padding:8px 11px;font-size:14px;cursor:pointer;min-width:42px;font-weight:700;
  }
  .pbtn:active{transform:translateY(1px)}
  .pbtn.on{background:var(--me);color:#1c1812;border-color:#d8b04a}
  .pbtn.num{min-width:34px;padding:8px 0}
  .pbtn.danger{background:#52302b;border-color:#7a4a42}
  .pbtn.go{background:#2f4a2f;border-color:#4d7a4d}
  #pad .preview{font-family:var(--hand);font-size:18px;color:#ffd97a;min-width:60px;text-align:center}
  #pad input.note{
    flex:1;background:#1d1b17;border:1px solid #5a5244;border-radius:6px;color:#f0e8d8;
    padding:8px;font-family:var(--hand);font-size:14px;outline:none;min-width:120px;
  }
  #pad .who{font-size:12px;color:#cdbf9f;margin-right:auto}

  /* ---------- shelf / cover ---------- */
  .cover{
    width:min(680px,94vw);margin:30px auto;border-radius:6px;position:relative;
    background:linear-gradient(160deg,#7a1f1f,#5c1414 60%,#4a1010);
    box-shadow:0 22px 50px rgba(0,0,0,.6), inset 0 0 0 3px rgba(255,255,255,.06);
    padding:34px 30px 30px;color:#f3e6c8;
  }
  .cover::before{ /* spiral binding */
    content:"";position:absolute;left:10px;top:18px;bottom:18px;width:8px;
    background:repeating-linear-gradient(180deg,#d8d3c6 0 6px,transparent 6px 22px);
    border-radius:4px;opacity:.7;
  }
  .cover h1{font-size:26px;letter-spacing:.14em;text-align:center;margin:0;font-weight:900}
  .cover .subt{text-align:center;font-size:12px;letter-spacing:.3em;color:#d9b87a;margin:6px 0 22px}
  .cover .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
  .gamelist{display:flex;flex-direction:column;gap:8px}
  .gamecard{
    background:var(--paper);color:var(--ink);border-radius:3px;padding:10px 14px;
    cursor:pointer;display:flex;justify-content:space-between;gap:10px;align-items:center;
    box-shadow:0 3px 8px rgba(0,0,0,.35);flex-wrap:wrap;
  }
  .gamecard:hover{transform:translateY(-1px)}
  .gamecard .g1{font-weight:bold;font-size:14px}
  .gamecard .g2{font-family:var(--hand);color:var(--pencil);font-size:14px}
  .gamecard .del{color:#a33;font-size:12px;cursor:pointer;border:none;background:none;padding:4px}
  .empty{color:#e8d9b4;text-align:center;font-size:14px;padding:16px;font-style:italic}

  /* ---------- lineup modal ---------- */
  #modal{
    position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;
    align-items:flex-start;justify-content:center;overflow:auto;padding:20px 8px;
  }
  #modal.open{display:flex}
  .mcard{background:var(--paper);border-radius:6px;padding:20px 22px;width:min(560px,96vw);box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .mcard h2{margin:0 0 12px;font-size:18px;letter-spacing:.06em}
  .mrow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
  .mrow label{font-size:11px;font-weight:bold;width:74px;flex:none}
  .mrow input{flex:1;border:1px solid #bbb;border-radius:4px;padding:7px;font-family:var(--hand);font-size:15px;color:var(--pencil);background:#fffdf6;outline:none}
  .lurow{display:flex;gap:6px;margin-bottom:5px;align-items:center}
  .lurow .ord{width:18px;font-size:11px;font-weight:bold;color:#888;text-align:right}
  .lurow input.nm{flex:1;border:1px solid #ccc;border-radius:4px;padding:6px;font-family:var(--hand);font-size:14px;background:#fffdf6;outline:none;color:var(--pencil)}
  .lurow input.ps{width:46px;text-align:center;border:1px solid #ccc;border-radius:4px;padding:6px;font-family:var(--hand);font-size:14px;background:#fffdf6;outline:none;color:var(--pencil)}
  .lurow .star{font-size:18px;cursor:pointer;color:#c5bda9;user-select:none;padding:0 3px}
  .lurow .star.on{color:var(--me)}
  .mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  .mbtn{border:none;border-radius:5px;padding:9px 16px;font-size:14px;cursor:pointer;font-weight:bold}
  .mbtn.pri{background:#2f4a2f;color:#fff}
  .mbtn.sec{background:#ddd}
  .mhint{font-size:11px;color:#777;margin:4px 0 10px}

  /* ---------- stats page ---------- */
  .statpage{width:min(760px,95vw);margin:24px auto;background:var(--paper);padding:26px 30px;box-shadow:0 18px 45px rgba(0,0,0,.55);transform:rotate(.2deg)}
  .statpage h2{text-align:center;letter-spacing:.1em;margin:0 0 2px;font-size:22px}
  .statpage .who{text-align:center;font-family:var(--hand);font-size:20px;color:var(--pencil);margin-bottom:14px;font-weight:700}
  table.career{border-collapse:collapse;width:100%;margin-bottom:18px}
  table.career th,table.career td{border:1px solid var(--ink);font-size:12px;padding:5px 4px;text-align:center}
  table.career th{background:var(--paper2);font-size:10px}
  table.career td{font-family:var(--hand);color:var(--pencil);font-weight:700;font-size:15px}
  table.glog{border-collapse:collapse;width:100%}
  table.glog th,table.glog td{border:1px solid #999;font-size:11px;padding:4px;text-align:center}
  table.glog th{background:var(--paper2)}
  table.glog td{font-family:var(--hand);color:var(--pencil)}
  .spark{display:block;margin:6px auto 16px}

  @media (max-width:1180px){
    #pagewrap{justify-content:flex-start;overflow-x:auto}
  }
  @media print{
    body{background:#fff}
    #bar,#pad,.bbtn{display:none!important}
    .page{box-shadow:none;transform:none;clip-path:none;width:100%;padding:10px}
    .page::before{display:none}
    td.dcell{height:52px}
  }
</style>
</head>
<body>
<div id="bar"></div>
<div id="view"></div>
<div id="pad"></div>
<div id="modal"></div>

<script>
"use strict";
/* ============================================================
   THE SCOREBOOK — single-file, offline-first.
   Data model: localStorage holds an array of complete game
   objects; career stats are always computed from games (never
   stored), so editing an old game auto-corrects everything.
   ============================================================ */

const LS_GAMES="sb_games_v1", LS_LINEUP="sb_lastlineup_v1";
const INNINGS=9, ROWS=12;
const $=s=>document.querySelector(s);

/* ---------- storage ---------- */
function loadGames(){ try{return JSON.parse(localStorage.getItem(LS_GAMES))||[]}catch(e){return[]} }
function saveGames(gs){ localStorage.setItem(LS_GAMES,JSON.stringify(gs)) }

/* ---------- state ---------- */
let S={ screen:"shelf", games:loadGames(), curId:null, sel:null, undo:[] };
const cur=()=>S.games.find(g=>g.id===S.curId);

function blankCell(){ return {res:"",detail:"",bases:0,out:false,rbi:0,sb:0,b:0,s:0,note:""} }
function newGame(meta,lineup){
  return {
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    date:meta.date, opp:meta.opp, loc:meta.loc,
    lineup, // [{name,pos,sub,me}]
    cells:Array.from({length:ROWS},()=>Array.from({length:INNINGS},blankCell)),
    them:Array(INNINGS).fill(""), errs:Array(ROWS).fill(0),
    pitchers:[{},{},{}], wls:""
  };
}

/* ---------- stat engine (everything derives from cells) ---------- */
const HIT={ "1B":1,"2B":2,"3B":3,"HR":4 };
const NOT_AB=new Set(["BB","HBP","SAC","SF",""]);
function rowLine(g,r){
  let L={ab:0,r:0,h:0,"2b":0,"3b":0,hr:0,sb:0,bb:0,so:0,rbi:0,tb:0,hbp:0,sf:0,pa:0};
  for(const c of g.cells[r]){
    if(!c.res && !c.bases && !c.out) continue;
    L.pa++;
    if(!NOT_AB.has(c.res)) L.ab++;
    if(HIT[c.res]){ L.h++; L.tb+=HIT[c.res];
      if(c.res==="2B")L["2b"]++; if(c.res==="3B")L["3b"]++; if(c.res==="HR")L.hr++; }
    if(c.res==="BB")L.bb++;
    if(c.res==="HBP")L.hbp++;
    if(c.res==="SF")L.sf++;
    if(c.res==="K"||c.res==="ꓘ")L.so++;
    if(c.bases>=4)L.r++;
    L.rbi+=c.rbi; L.sb+=c.sb;
  }
  return L;
}
function inningTotals(g,i){
  let R=0,H=0;
  for(let r=0;r<ROWS;r++){ const c=g.cells[r][i];
    if(c.bases>=4)R++; if(HIT[c.res])H++; }
  return {R,H};
}
function outsBefore(g,i,row){ // out number = count of outs in this inning at/above this row
  let n=0;
  for(let r=0;r<=row;r++) if(g.cells[r][i].out) n++;
  return n;
}
function meIndex(g){ return g.lineup.findIndex(p=>p.me) }
function careerLine(){
  let T={g:0,ab:0,r:0,h:0,"2b":0,"3b":0,hr:0,sb:0,bb:0,so:0,rbi:0,tb:0,hbp:0,sf:0,pa:0},per=[];
  for(const g of S.games){
    const m=meIndex(g); if(m<0)continue;
    const L=rowLine(g,m); if(L.pa===0)continue;
    T.g++; for(const k in L) if(k!=="pa")T[k]+=L[k]; T.pa+=L.pa;
    per.push({date:g.date,opp:g.opp,L});
  }
  return {T,per};
}
const avg=(h,ab)=>ab?(h/ab).toFixed(3).replace(/^0/,""):"—";
function obp(L){ const d=L.ab+L.bb+L.hbp+L.sf; return d?((L.h+L.bb+L.hbp)/d).toFixed(3).replace(/^0/,""):"—" }
const slg=L=>L.ab?(L.tb/L.ab).toFixed(3).replace(/^0/,""):"—";

/* ---------- persistence ---------- */
function persist(){ saveGames(S.games) }
function snapshot(){ const g=cur(); if(!g)return;
  S.undo.push(JSON.stringify(g)); if(S.undo.length>60)S.undo.shift(); }
function doUndo(){ const g=cur(); if(!g||!S.undo.length)return;
  Object.assign(g,JSON.parse(S.undo.pop())); persist(); renderSheet(); }

/* ============================================================
   RENDER — top bar
   ============================================================ */
function renderBar(){
  const b=$("#bar"); const g=cur();
  if(S.screen==="sheet"&&g){
    b.innerHTML=`<button class="bbtn" onclick="goShelf()">&#8592; GAMES</button>
      <span class="ttl">vs ${esc(g.opp||"?")} &nbsp;&middot;&nbsp; ${esc(g.date)}</span>
      <button class="bbtn" onclick="doUndo()">UNDO</button>
      <button class="bbtn" onclick="goStats()">MY STATS</button>
      <button class="bbtn" onclick="window.print()">PRINT</button>`;
  } else if(S.screen==="stats"){
    b.innerHTML=`<button class="bbtn" onclick="goShelf()">&#8592; GAMES</button><span class="ttl">CAREER</span>`;
  } else b.innerHTML="";
}

/* ============================================================
   RENDER — shelf (book cover)
   ============================================================ */
function goShelf(){ S.screen="shelf"; S.sel=null; closePad(); render(); }
function renderShelf(){
  const list=[...S.games].sort((a,b)=>a.id<b.id?1:-1); // newest first
  const cards=list.length? list.map(g=>{
    const m=meIndex(g); let line="";
    if(m>=0){ const L=rowLine(g,m);
      if(L.pa) line=`Me: ${L.h}-${L.ab}${L.hr?", "+L.hr+" HR":""}${L.rbi?", "+L.rbi+" RBI":""}`; }
    const us=g.cells?range(INNINGS).reduce((s,i)=>s+inningTotals(g,i).R,0):0;
    const them=g.them.reduce((s,x)=>s+(parseInt(x)||0),0);
    return `<div class="gamecard" onclick="openGame('${g.id}')">
      <span class="g1">${esc(g.date)} &nbsp;vs ${esc(g.opp||"?")}</span>
      <span class="g2">${us}&ndash;${them}${line?" &nbsp;&middot;&nbsp; "+line:""}</span>
      <button class="del" onclick="event.stopPropagation();delGame('${g.id}')">remove</button>
    </div>`;
  }).join("") : `<div class="empty">No games yet — tear out a fresh page.</div>`;
  $("#view").innerHTML=`<div class="cover">
    <h1>OFFICIAL SCOREBOOK</h1><div class="subt">USA SOFTBALL STYLE &middot; EST. 2026</div>
    <div class="actions">
      <button class="bbtn" onclick="openLineup()">+ NEW GAME</button>
      <button class="bbtn" onclick="goStats()">MY STATS</button>
      <button class="bbtn" onclick="backup()">BACKUP</button>
      <button class="bbtn" onclick="$('#restorefile').click()">RESTORE</button>
      <input type="file" id="restorefile" accept=".json" style="display:none" onchange="restore(this)">
    </div>
    <div class="gamelist">${cards}</div>
  </div>`;
}
function delGame(id){ if(!confirm("Remove this game? Its stats leave your career line."))return;
  S.games=S.games.filter(g=>g.id!==id); persist(); renderShelf(); }
function openGame(id){ S.curId=id; S.screen="sheet"; S.undo=[]; render(); }

/* ---------- backup / restore ---------- */
function backup(){
  const blob=new Blob([JSON.stringify({v:1,games:S.games})],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="scorebook-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click();
}
function restore(inp){
  const f=inp.files[0]; if(!f)return;
  f.text().then(t=>{ const d=JSON.parse(t);
    if(!d.games) throw 0;
    const ids=new Set(S.games.map(g=>g.id));
    let n=0; for(const g of d.games) if(!ids.has(g.id)){S.games.push(g);n++}
    persist(); alert(n+" game(s) restored."); renderShelf();
  }).catch(()=>alert("That file doesn't look like a scorebook backup."));
}

/* ============================================================
   RENDER — lineup modal
   ============================================================ */
function openLineup(){
  let last=[]; try{last=JSON.parse(localStorage.getItem(LS_LINEUP))||[]}catch(e){}
  const today=new Date(); const ds=(today.getMonth()+1)+"/"+today.getDate()+"/"+today.getFullYear();
  const rows=range(ROWS).map(i=>{
    const p=last[i]||{};
    return `<div class="lurow"><span class="ord">${i+1}</span>
      <input class="nm" id="lu_n${i}" placeholder="${i<10?"player name":"(extra)"}" value="${esc(p.name||"")}">
      <input class="ps" id="lu_p${i}" placeholder="POS" value="${esc(p.pos||"")}">
      <span class="star ${p.me?"on":""}" id="lu_s${i}" onclick="pickMe(${i})" title="That's me">&#9733;</span>
    </div>`;
  }).join("");
  $("#modal").innerHTML=`<div class="mcard">
    <h2>NEW GAME</h2>
    <div class="mrow"><label>DATE</label><input id="lu_date" value="${ds}"></div>
    <div class="mrow"><label>OPPONENT</label><input id="lu_opp" placeholder="vs ..."></div>
    <div class="mrow"><label>FIELD</label><input id="lu_loc" placeholder="at ..."></div>
    <div class="mhint">Batting order below. Tap the &#9733; on your own row — that row feeds your career stats.</div>
    ${rows}
    <div class="mfoot">
      <button class="mbtn sec" onclick="$('#modal').classList.remove('open')">Cancel</button>
      <button class="mbtn pri" onclick="startGame()">Tear Out a Page &#8594;</button>
    </div>
  </div>`;
  $("#modal").classList.add("open");
}
function pickMe(i){
  // exclusive toggle: turn all off, then this one on (or off if it was on)
  const was=$("#lu_s"+i).classList.contains("on");
  range(ROWS).forEach(j=>$("#lu_s"+j).classList.remove("on"));
  if(!was)$("#lu_s"+i).classList.add("on");
}
function startGame(){
  const lineup=range(ROWS).map(i=>({
    name:$("#lu_n"+i).value.trim(), pos:$("#lu_p"+i).value.trim(),
    sub:"", me:$("#lu_s"+i).classList.contains("on")
  }));
  localStorage.setItem(LS_LINEUP,JSON.stringify(lineup));
  const g=newGame({date:$("#lu_date").value.trim(),opp:$("#lu_opp").value.trim(),loc:$("#lu_loc").value.trim()},lineup);
  S.games.push(g); persist();
  $("#modal").classList.remove("open");
  openGame(g.id);
}

/* ============================================================
   RENDER — the score sheet (the torn page)
   ============================================================ */
function renderSheet(){
  const g=cur(); if(!g){goShelf();return}
  const cols=`<col class="c-name"><col class="c-pos">${range(INNINGS).map(()=>'<col class="c-inn">').join("")}${range(8).map(()=>'<col class="c-stat">').join("")}`;
  const head=`<tr>
    <th class="players-h">PLAYERS</th><th>POS</th>
    ${range(INNINGS).map(i=>`<th>${i+1}</th>`).join("")}
    ${["AB","R","H","SB","BB","SO","RBI","E"].map(s=>`<th>${s}</th>`).join("")}
  </tr>`;

  const body=range(ROWS).map(r=>{
    const p=g.lineup[r], L=rowLine(g,r);
    const cells=range(INNINGS).map(i=>cellHTML(g,r,i)).join("");
    return `<tr class="${p.me?"merow":""}">
      <td class="namecell">
        <span class="mestar ${p.me?"on":""}" onclick="toggleMe(${r})" title="That's me">&#9733;</span>
        <input class="pname" value="${esc(p.name)}" onchange="setLineup(${r},'name',this.value)">
        <div class="sub">Sub.<input value="${esc(p.sub||"")}" onchange="setLineup(${r},'sub',this.value)"></div>
      </td>
      <td class="poscell"><input value="${esc(p.pos)}" onchange="setLineup(${r},'pos',this.value)"></td>
      ${cells}
      ${["ab","r","h","sb","bb","so","rbi"].map(k=>`<td class="statcell">${L.pa?L[k]:""}</td>`).join("")}
      <td class="statcell e" onclick="bumpErr(${r})" title="tap to add an error">${g.errs[r]||""}</td>
    </tr>`;
  }).join("");

  const totR=range(INNINGS).map(i=>inningTotals(g,i).R);
  const totH=range(INNINGS).map(i=>inningTotals(g,i).H);
  const sumR=totR.reduce((a,b)=>a+b,0), sumH=totH.reduce((a,b)=>a+b,0);
  const sumE=g.errs.reduce((a,b)=>a+(b||0),0);
  const sumThem=g.them.reduce((s,x)=>s+(parseInt(x)||0),0);
  const totals=`
    <tr class="totals"><td colspan="2" class="rowlbl">RUNS</td>
      ${totR.map(x=>`<td>${x||""}</td>`).join("")}
      <td colspan="2">${sumR}</td><td colspan="6" rowspan="3" style="font-family:var(--print);font-size:10px;color:#666">R / H / E<br><span style="font-family:var(--hand);font-size:16px;color:var(--pencil)">${sumR} / ${sumH} / ${sumE}</span></td></tr>
    <tr class="totals"><td colspan="2" class="rowlbl">HITS</td>
      ${totH.map(x=>`<td>${x||""}</td>`).join("")}
      <td colspan="2">${sumH}</td></tr>
    <tr class="totals"><td colspan="2" class="rowlbl">THEM</td>
      ${range(INNINGS).map(i=>`<td><input value="${esc(g.them[i])}" onchange="setThem(${i},this.value)"></td>`).join("")}
      <td colspan="2">${sumThem}</td></tr>`;

  const pcols=["PITCHERS","IP","AB","H","R","ER","BB","SO","HR","WP","HB"];
  const pitch=`<table class="pitch">
    <tr><th style="text-align:left">W&nbsp;L&nbsp;S&nbsp;<input style="width:60px" value="${esc(g.wls||"")}" onchange="cur().wls=this.value;persist()"></th>${pcols.slice(1).map(c=>`<th>${c}</th>`).join("")}</tr>
    ${g.pitchers.map((p,i)=>`<tr>
      ${pcols.map((c,j)=>`<td><input class="${j===0?"pn":""}" value="${esc(p[c]||"")}" onchange="setPitch(${i},'${c}',this.value)"></td>`).join("")}
    </tr>`).join("")}
  </table>`;

  $("#view").innerHTML=`<div id="pagewrap"><div class="page">
    <div class="sheet-title">USA SOFTBALL SCORE SHEET</div>
    <div class="meta">
      <span class="lbl">vs.</span><input class="fill" value="${esc(g.opp)}" onchange="cur().opp=this.value;persist();renderBar()">
      <span class="lbl">at</span><input class="fill" value="${esc(g.loc)}" onchange="cur().loc=this.value;persist()">
      <span class="lbl">Date</span><input class="fill small" value="${esc(g.date)}" onchange="cur().date=this.value;persist();renderBar()">
    </div>
    <table class="score">${cols}${head}${body}${totals}</table>
    <div class="bottom">${pitch}
      <div class="brand"><span class="shield">&#9701;&#9698;</span><br>USA SOFTBALL STYLE<br>www.USAsoftball.com</div>
    </div>
  </div></div>`;
  renderBar();
}

/* ---------- one diamond cell ---------- */
function cellHTML(g,r,i){
  const c=g.cells[r][i];
  const seld=S.sel&&S.sel.r===r&&S.sel.i===i?" sel":"";
  // basepath segments: home->1st, 1st->2nd, 2nd->3rd, 3rd->home
  const pts={h:[50,90],f:[84,56],s:[50,22],t:[16,56]};
  const segs=[[pts.h,pts.f],[pts.f,pts.s],[pts.s,pts.t],[pts.t,pts.h]];
  const run=c.bases>=4;
  let svg=`<svg class="dsvg" viewBox="0 0 100 100" preserveAspectRatio="none">`;
  if(run) svg+=`<polygon points="50,90 84,56 50,22 16,56" fill="var(--pencil)" opacity=".82"/>`;
  segs.forEach((sg,k)=>{
    const drawn=c.bases>k;
    svg+=`<line x1="${sg[0][0]}" y1="${sg[0][1]}" x2="${sg[1][0]}" y2="${sg[1][1]}"
      stroke="${drawn?"var(--pencil)":"#b9b2a0"}" stroke-width="${drawn?3.4:1}"
      ${drawn?'stroke-linecap="round"':'stroke-dasharray="2.5,2.5"'} />`;
  });
  const txt=(c.res||"")+(c.detail?(HIT[c.res]||c.res==="BB"||c.res==="HBP"?" ":"")+c.detail:"");
  if(txt) svg+=`<text class="restxt" x="50" y="${run?"64":"62"}" text-anchor="middle"
      font-size="${txt.length>4?20:26}" fill="${run?"var(--paper)":"var(--pencil)"}">${esc(txt)}</text>`;
  if(c.out){ const n=outsBefore(g,i,r);
    svg+=`<circle cx="86" cy="86" r="11" fill="none" stroke="var(--pencil)" stroke-width="2.4"/>
      <text x="86" y="91" text-anchor="middle" font-size="15" font-weight="bold" fill="var(--pencil)" class="restxt">${n}</text>`; }
  if(c.rbi) svg+=`<text x="8" y="95" font-size="13" fill="var(--pencil)" class="restxt">${"&bull;".repeat(Math.min(c.rbi,4))}</text>`;
  if(c.sb) svg+=`<text x="50" y="12" text-anchor="middle" font-size="11" fill="var(--pencil)" class="restxt">SB${c.sb>1?"&times;"+c.sb:""}</text>`;
  if(c.note&&!txt) svg+=`<text x="50" y="62" text-anchor="middle" font-size="15" fill="var(--pencil)" class="restxt">${esc(c.note.slice(0,8))}</text>`;
  svg+=`</svg>`;
  const pips=`<div class="pips">
    ${[0,1,2].map(k=>`<div class="pip ${c.b>k?"on":""}" onclick="event.stopPropagation();pip(${r},${i},'b',${k})"></div>`).join("")}
    ${[0,1].map(k=>`<div class="pip s ${c.s>k?"on":""}" onclick="event.stopPropagation();pip(${r},${i},'s',${k})"></div>`).join("")}
  </div>`;
  return `<td class="dcell${seld}" onclick="selCell(${r},${i})"><div class="cellbox">${pips}${svg}</div></td>`;
}

/* ---------- sheet mutations ---------- */
function setLineup(r,k,v){ snapshot(); cur().lineup[r][k]=v; persist(); }
function toggleMe(r){ snapshot(); const g=cur(); const was=g.lineup[r].me;
  g.lineup.forEach(p=>p.me=false); g.lineup[r].me=!was; persist(); renderSheet(); }
function bumpErr(r){ snapshot(); const g=cur(); g.errs[r]=((g.errs[r]||0)+1)%10; persist(); renderSheet(); }
function setThem(i,v){ cur().them[i]=v; persist(); renderSheet(); }
function setPitch(i,k,v){ cur().pitchers[i][k]=v; persist(); }
function pip(r,i,kind,k){ snapshot(); const c=cur().cells[r][i];
  c[kind]=(c[kind]===k+1)?k:k+1; persist(); renderSheet(); }

/* ============================================================
   SCORE PAD
   ============================================================ */
function selCell(r,i){ S.sel={r,i}; renderSheet(); renderPad(); }
function closePad(){ $("#pad").classList.remove("open"); S.sel=null; }
function padCell(){ return S.sel?cur().cells[S.sel.r][S.sel.i]:null }

const REACH=["1B","2B","3B","HR","BB","HBP","E","FC"];
const OUTRES=["K","ꓘ","G","F","L","P","DP","SF","SAC"];
const REACH_BASES={"1B":1,"2B":2,"3B":3,"HR":4,"BB":1,"HBP":1,"E":1,"FC":1};

function renderPad(){
  const c=padCell(); if(!c){closePad();return}
  const g=cur(); const p=g.lineup[S.sel.r];
  const who=`${esc(p.name||"Batter "+(S.sel.r+1))} &middot; inning ${S.sel.i+1}`;
  const txt=(c.res||"")+(c.detail?" "+c.detail:"");
  $("#pad").innerHTML=`
    <div class="padrow"><span class="who">${who}</span>
      <span class="preview">${esc(txt)||"&mdash;"}</span>
      <button class="pbtn danger" onclick="clearCell()">CLEAR</button>
      <button class="pbtn go" onclick="closePadDone()">DONE</button></div>
    <div class="padrow"><span class="plbl">ON BASE</span>
      ${REACH.map(x=>`<button class="pbtn ${c.res===x?"on":""}" onclick="setRes('${x}')">${x}</button>`).join("")}</div>
    <div class="padrow"><span class="plbl">OUT</span>
      ${OUTRES.map(x=>`<button class="pbtn ${c.res===x?"on":""}" onclick="setRes('${x}')">${x==="G"?"GO":x==="F"?"FLY":x==="L"?"LINE":x==="P"?"POP":x}</button>`).join("")}</div>
    <div class="padrow"><span class="plbl">FIELDER</span>
      ${range(10).map(n=>`<button class="pbtn num" onclick="addF(${n+1})">${n+1}</button>`).join("")}
      <button class="pbtn num" onclick="backF()">&#9003;</button></div>
    <div class="padrow"><span class="plbl">BASES</span>
      <button class="pbtn ${c.bases===1?"on":""}" onclick="setBases(1)">&#9670; 1st</button>
      <button class="pbtn ${c.bases===2?"on":""}" onclick="setBases(2)">2nd</button>
      <button class="pbtn ${c.bases===3?"on":""}" onclick="setBases(3)">3rd</button>
      <button class="pbtn ${c.bases===4?"on":""}" onclick="setBases(4)">HOME&nbsp;&#127968;</button>
      <button class="pbtn ${c.out&&c.bases>0?"on":""}" onclick="outOnBase()">OUT ON BASE</button></div>
    <div class="padrow"><span class="plbl">EXTRAS</span>
      ${[0,1,2,3,4].map(n=>`<button class="pbtn num ${c.rbi===n?"on":""}" onclick="setRBI(${n})">${n?n+" RBI":"0 RBI"}</button>`).join("")}
      <button class="pbtn" onclick="addSB()">+SB${c.sb?" ("+c.sb+")":""}</button>
      <input class="note" placeholder="pencil it in... (anything)" value="${esc(c.note)}" onchange="setNote(this.value)">
    </div>`;
  $("#pad").classList.add("open");
}
function setRes(x){ snapshot(); const c=padCell();
  c.res=(c.res===x)?"":x;
  if(REACH_BASES[c.res]!==undefined){ c.bases=REACH_BASES[c.res]; c.out=false; }
  else if(c.res){ c.out=true; c.bases=0; if(c.res==="K"||c.res==="ꓘ")c.detail=""; }
  else { c.bases=0; c.out=false; }
  persist(); renderSheet(); renderPad(); }
function addF(n){ snapshot(); const c=padCell();
  c.detail=(c.detail?c.detail+(c.detail.length<8?"-":""):"")+n;
  persist(); renderSheet(); renderPad(); }
function backF(){ snapshot(); const c=padCell();
  c.detail=c.detail.replace(/-?\d+$/,""); persist(); renderSheet(); renderPad(); }
function setBases(n){ snapshot(); const c=padCell();
  c.bases=(c.bases===n)?n-1:n; if(c.bases>=4)c.out=false;
  persist(); renderSheet(); renderPad(); }
function outOnBase(){ snapshot(); const c=padCell();
  c.out=!c.out; persist(); renderSheet(); renderPad(); }
function setRBI(n){ snapshot(); padCell().rbi=n; persist(); renderSheet(); renderPad(); }
function addSB(){ snapshot(); const c=padCell(); c.sb=(c.sb+1)%5; persist(); renderSheet(); renderPad(); }
function setNote(v){ snapshot(); padCell().note=v; persist(); renderSheet(); }
function clearCell(){ snapshot(); const g=cur();
  g.cells[S.sel.r][S.sel.i]=blankCell(); persist(); renderSheet(); renderPad(); }
function closePadDone(){ closePad(); renderSheet(); }

/* ============================================================
   RENDER — career stats
   ============================================================ */
function goStats(){ S.screen="stats"; closePad(); render(); }
function renderStats(){
  const {T,per}=careerLine();
  const meName=(()=>{ for(let k=S.games.length-1;k>=0;k--){ const m=meIndex(S.games[k]);
      if(m>=0&&S.games[k].lineup[m].name) return S.games[k].lineup[m].name; } return "Me"; })();
  // cumulative AVG sparkline
  let ch=0,cab=0; const ptsArr=per.map(x=>{ch+=x.L.h;cab+=x.L.ab;return cab?ch/cab:0});
  const W=420,H=60;
  const spark=ptsArr.length>1?`<svg class="spark" width="${W}" height="${H}">
      <polyline fill="none" stroke="var(--pencil)" stroke-width="2.5" stroke-linejoin="round"
        points="${ptsArr.map((v,i)=>`${10+i*(W-20)/(ptsArr.length-1)},${H-8-v*(H-16)}`).join(" ")}"/>
      <text x="${W-4}" y="12" text-anchor="end" font-size="12" font-family="var(--hand)" fill="var(--pencil)">AVG trend</text>
    </svg>`:"";
  const glog=per.slice(-10).reverse().map(x=>`<tr>
    <td>${esc(x.date)}</td><td>${esc(x.opp||"?")}</td>
    <td>${x.L.h}-${x.L.ab}</td><td>${x.L.r}</td><td>${x.L.hr||""}</td><td>${x.L.rbi||""}</td><td>${x.L.sb||""}</td>
  </tr>`).join("");
  $("#view").innerHTML=`<div class="statpage">
    <h2>SEASON / CAREER RECORD</h2>
    <div class="who">&#9733; ${esc(meName)}</div>
    <table class="career">
      <tr><th>G</th><th>AB</th><th>R</th><th>H</th><th>2B</th><th>3B</th><th>HR</th><th>RBI</th><th>BB</th><th>SO</th><th>SB</th><th>AVG</th><th>OBP</th><th>SLG</th></tr>
      <tr><td>${T.g}</td><td>${T.ab}</td><td>${T.r}</td><td>${T.h}</td><td>${T["2b"]}</td><td>${T["3b"]}</td><td>${T.hr}</td><td>${T.rbi}</td><td>${T.bb}</td><td>${T.so}</td><td>${T.sb}</td>
      <td>${avg(T.h,T.ab)}</td><td>${obp(T)}</td><td>${slg(T)}</td></tr>
    </table>
    ${spark}
    <table class="glog">
      <tr><th>DATE</th><th>OPPONENT</th><th>LINE</th><th>R</th><th>HR</th><th>RBI</th><th>SB</th></tr>
      ${glog||`<tr><td colspan="7" style="font-style:italic;color:#888">Star your row in a game and your line shows up here.</td></tr>`}
    </table>
  </div>`;
  renderBar();
}

/* ============================================================
   utils + boot
   ============================================================ */
function range(n){ return Array.from({length:n},(_,i)=>i) }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") }
function render(){
  renderBar();
  if(S.screen==="shelf")renderShelf();
  else if(S.screen==="sheet")renderSheet();
  else if(S.screen==="stats")renderStats();
}
render();
</script>
</body>
</html>
